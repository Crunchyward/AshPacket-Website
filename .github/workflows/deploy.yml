name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Upgrade npm
        run: npm install -g npm@12.0.1

      - name: Install dependencies
        run: |
          npm -v
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'package.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'package.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Clean metadata files
        run: node scripts/clean-metadata.mjs

      - name: Determine base path
        id: basepath
        # Sites served at username.github.io/repo-name need assets prefixed
        # with /repo-name. Set the NEXT_PUBLIC_BASE_PATH repo variable to "/"
        # to override this when using a custom domain or a root user site.
        run: |
          BASE="${{ vars.NEXT_PUBLIC_BASE_PATH }}"
          if [ -z "$BASE" ]; then
            BASE="/${{ github.event.repository.name }}"
          elif [ "$BASE" = "/" ]; then
            BASE=""
          fi
          echo "Using base path: '$BASE'"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

          SITE="${{ vars.NEXT_PUBLIC_SITE_URL }}"
          if [ -z "$SITE" ]; then
            OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
            SITE="https://${OWNER}.github.io${BASE}"
          fi
          echo "Using site URL: '$SITE'"
          echo "site=$SITE" >> "$GITHUB_OUTPUT"

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.base }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.basepath.outputs.site }}

      - name: Verify build output
        run: |
          if [ ! -d out ] || [ -z "$(ls -A out)" ]; then
            echo "Build did not produce static files in out/"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
